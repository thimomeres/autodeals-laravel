services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autodeals-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - autodeals

  mysql:
    image: mysql:8.4
    container_name: autodeals-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: db_autodeals
      MYSQL_USER: autodeals
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - autodeals

networks:
  autodeals:
    driver: bridge

volumes:
  mysql_data:
